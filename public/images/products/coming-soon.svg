<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EBF4FA"/>
      <stop offset="100%" stop-color="#F7FBFD"/>
    </linearGradient>
    <clipPath id="frame-clip">
      <rect x="130" y="138" width="140" height="112" rx="7"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bg)"/>

  <!-- Image frame (dashed border) -->
  <rect x="130" y="138" width="140" height="112" rx="7"
        fill="#EBF4FA" stroke="#A8C8DA" stroke-width="2" stroke-dasharray="7 4"/>

  <!-- Landscape scene clipped to frame -->
  <g clip-path="url(#frame-clip)">
    <!-- Sky tint -->
    <rect x="130" y="138" width="140" height="112" fill="#EBF4FA"/>
    <!-- Sun -->
    <circle cx="252" cy="163" r="14" fill="#C5DDE9"/>
    <!-- Mountains -->
    <polygon points="130,250 168,196 200,222 242,178 270,208 270,250"
             fill="#BDCFDA" opacity="0.85"/>
    <!-- Foreground hill -->
    <ellipse cx="195" cy="256" rx="90" ry="22" fill="#A8BFC9" opacity="0.5"/>
  </g>

  <!-- Icon label -->
  <text x="200" y="286"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="11"
        font-weight="700"
        fill="#7AAABB"
        letter-spacing="2">IMAGE COMING SOON</text>

  <!-- Subtle ELV8 watermark -->
  <text x="200" y="306"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="9"
        font-weight="500"
        fill="#9BBFCC"
        letter-spacing="3">ELV8 WELLNESS</text>
</svg>
